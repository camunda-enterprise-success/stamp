# config for https://github.com/camunda-community-hub/camunda-8-benchmark
apiVersion: apps/v1
kind: Deployment
metadata:
  name: benchmark
  labels:
    app: benchmark
spec:
  selector:
    matchLabels:
      app: benchmark
  replicas: 1
  template:
    metadata:
      labels:
        app: benchmark
    spec:
      containers:
      - name: benchmark
        image: camundacommunityhub/camunda-8-benchmark:main
        imagePullPolicy: Always
        env:
          - name: JAVA_OPTIONS
            value: >-
              -Dcamunda.client.mode=self-managed
              -Dcamunda.client.auth.token-url=https://keycloak.consulting-sandbox.camunda.cloud/realms/jens-keycloak-as-oidc/protocol/openid-connect/token
              -Dcamunda.client.zeebe.grpc-address=http://camunda-zeebe-gateway:26500            
              -Dcamunda.client.zeebe.prefer-rest-over-grpc=false
              -Dcamunda.client.auth.client-id=benchmark-client
              -Dcamunda.client.auth.client-secret=benchmark-client
              -Dcamunda.client.zeebe.enabled=true
              -Dcamunda.client.zeebe.prefer-rest-over-grpc=false
              -Dbenchmark.startPiPerSecond=10
              -Dbenchmark.maxBackpressurePercentage=1.0
              -Dbenchmark.taskCompletionDelay=0
              -Dbenchmark.bpmnProcessId=BenchmarkProcess
              -Dbenchmark.jobType=benchmark-task
              -Dbenchmark.multipleJobTypes=15
              -Dbenchmark.payloadPath=file:/payload.json
              -Dbenchmark.autoDeployProcess=false
              -Dbenchmark.warmupPhaseDurationMillis=3000
              -Dbenchmark.startRateAdjustmentStrategy=none
              -Dbenchmark.startPiIncreaseFactor=0.1
        resources:
          limits:
            cpu: 1
            memory: 4Gi
          requests:
            cpu: 1
            memory: 4Gi
        volumeMounts:
        - name: payload
          mountPath: payload.json
          subPath: payload.json
          readOnly: true
      volumes:
      - name: payload
        configMap:
          name: payload
