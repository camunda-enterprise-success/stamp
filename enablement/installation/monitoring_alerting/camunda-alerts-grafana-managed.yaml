          severity: critical
          team: data-layer
        isPaused: false

      - uid: ii0eilmstopped
        title: ElasticIlmStopped
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              # The `== 1` filter returns 1 when ILM is STOPPED; result is absent when running.
              # Threshold gt: 0 fires whenever the expression returns a value.
              expr: |-
                avg(
                  avg_over_time(elasticsearch_ilm_status{operation_mode="STOPPED"}[10m]) == 1
                ) by (namespace)
                and on(namespace)
                elasticsearch_clusterinfo_version_info{version!~"7.*"}
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 24h
        labels:
          severity: warning
          team: data-layer
        isPaused: false

      - uid: jj0eoomcirc001
        title: ElasticOOMCircuitBreaker
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: |-
                sum(
                  rate(elasticsearch_breakers_tripped[10m])
                ) by (namespace)
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.5
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 30m
        labels:
          severity: warning
          team: data-layer
        isPaused: false

  # ---------------------------------------------------------------
  # Elasticsearch replica checks (1h evaluation — matches original group interval)
  # ---------------------------------------------------------------
  - orgId: 1
    name: elasticsearch-replica-1h
    folder: camunda-infrastructure
    interval: 1h
    rules:
      - uid: kk0ewrongrep01
        title: ElasticWrongReplicaCount
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              # The `== 0` filter returns 0 only for indices with zero replicas; absent otherwise.
              # Threshold lt: 1 fires when the result is 0 (i.e. replica count is zero).
              expr: |-
                avg(
                  avg_over_time(
                    elasticsearch_indices_settings_replicas[10m]
                  ) == 0
                ) by (namespace, index)
                and on (namespace)
                avg(
                  avg_over_time(
                    elasticsearch_cluster_health_number_of_data_nodes[10m]
                  ) > 1
                ) by (namespace)
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 24h
        labels:
          severity: critical
          # NOTE: original team was dynamic based on index name prefix:
          # "data-layer" for optimize/operate/tasklist/camunda/zeebe, "controller" otherwise.
          team: data-layer
        isPaused: false

