  # ---------------------------------------------------------------
  # Archiver alerts
  # ---------------------------------------------------------------
  - orgId: 1
    name: archiver-1m
    folder: camunda-platform
    interval: 1m
    rules:
      - uid: pp0aarchivbkpg
        title: ArchiverBacklogGrowing
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              # The expression already encodes the "growing" and "non-zero" conditions via
              # `>= 0` (delta not shrinking) and `> 0` (backlog exists) as inner filters.
              # The result is the backlog size when both hold; Grafana threshold fires on gt: 0.
              expr: |-
                (
                  delta(
                    (
                      sum by (namespace, partition) (zeebe_camunda_exporter_process_instances_awaiting_archival)
                    )[10m:1m]
                  ) >= 0
                )
                and
                (
                  sum by (namespace, partition) (zeebe_camunda_exporter_process_instances_awaiting_archival) > 0
                )
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 2h
        labels:
          severity: critical
          team: data-layer
        isPaused: false

