apiVersion: 1
groups:

  # ---------------------------------------------------------------
  # SLO / Application alerts
  # ---------------------------------------------------------------
  - orgId: 1
    name: zeebe-slo-1m
    folder: camunda-application
    interval: 1m
    rules:
      - uid: aa0zslo1req001
        title: ZeebeSLORequestFailureRate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: |-
                1 -
                sum(
                  rate(
                    grpc_server_handled_total{
                      code=~"DEADLINE_EXCEEDED|UNAVAILABLE",
                      grpc_method!="CreateProcessInstanceWithResult"
                    }[1m]
                  )
                ) by (namespace)
                /
                sum(
                  rate(
                    grpc_server_handled_total{
                      grpc_method!="CreateProcessInstanceWithResult"
                    }[1m]
                  )
                ) by (namespace)
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.995
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 1m
        labels:
          severity: critical
          team: zeebe
        isPaused: false

