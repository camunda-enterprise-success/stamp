  # ---------------------------------------------------------------
  # Elasticsearch alerts (1m evaluation)
  # ---------------------------------------------------------------
  - orgId: 1
    name: elasticsearch-1m
    folder: camunda-infrastructure
    interval: 1m
    rules:
      - uid: hh0eshards0001
        title: ElasticHighNumberOfShards
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              # NOTE: the recording rule `elasticsearch:shards_usage:ratio` has been inlined
              # as a subquery since Grafana managed alerts do not support recording rules.
              expr: |-
                avg_over_time(
                  (
                    avg(elasticsearch_cluster_health_active_shards) by (namespace)
                    /
                    (
                      avg(elasticsearch_cluster_health_number_of_data_nodes) by (namespace)
                      *
                      avg(elasticsearch_clustersettings_stats_max_shards_per_node) by (namespace)
                    )
                  )[10m:]
                )
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.9
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
