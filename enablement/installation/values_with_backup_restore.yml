orchestration:
    env:
        - name: ZEEBE_BROKER_EXECUTION_METRICS_EXPORTER_ENABLED
          value: "true"
        - name: CAMUNDA_DATA_BACKUP_STORE
          value: "S3"
        - name: CAMUNDA_DATA_BACKUP_S3_REGION
          value: "eu-central-1"
        - name: CAMUNDA_DATA_BACKUP_S3_ENDPOINT
          value: "https://s3.eu-central-1.amazonaws.com"
        - name: CAMUNDA_DATA_BACKUP_S3_ACCESSKEY
          valueFrom:
            secretKeyRef:
              name: camunda-backup-s3-credentials
              key: access-key
        - name: CAMUNDA_DATA_BACKUP_S3_SECRETKEY
          valueFrom:
            secretKeyRef:
              name: camunda-backup-s3-credentials
              key: secret-key

        - name: CAMUNDA_DATA_BACKUP_S3_BASEPATH
          value: "oc-runtime"   # base path for Zeebe runtime backups (managed by Camunda)
        - name: CAMUNDA_DATA_BACKUP_S3_BUCKETNAME
          value: "jens-88-backups"
        - name: CAMUNDA_DATA_BACKUP_REPOSITORY_NAME
          value: "jens-88-backups-webapps"   # Elasticsearch repository name for backupHistory

elasticsearch:
    master:
        replicaCount: 1
    global:
        kibanaEnabled: false
    initScripts:
        init-keystore.sh: |
            #!/bin/bash
            set -e
            
            echo "Adding S3 access keys to Elasticsearch keystore..."
            
            # Add S3 client default keys to the keystore
            echo "$S3_SECRET_KEY" | elasticsearch-keystore add -f -x s3.client.default.secret_key
            echo "$S3_ACCESS_KEY" | elasticsearch-keystore add -f -x s3.client.default.access_key
    extraEnvVars:
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: camunda-backup-s3-credentials
              key: access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: camunda-backup-s3-credentials
              key: secret-key

prometheusServiceMonitor:
    enabled: true